name: news-monitor
enabled: true
heartbeat: 3600
heartbeat_model: claude-haiku-4-5-20251001
telegram_chat_id: ""
permissions:
  bash: false
  internet: true
  write_outside_dir: false
  telegram_without_approval: true
crons:
  - id: morning-brief
    schedule: "0 8 * * *"
    model: claude-haiku-4-5-20251001
    prompt: >
      Find the 3 most important news stories today worldwide and locally.
      For each story: title, one line summary, source URL.
      Write the result to memory/today.md (overwrite completely).
      Then write formatted output to send via Telegram.

  - id: evening-recap
    schedule: "0 18 * * *"
    model: claude-sonnet-4-6
    prompt: >
      Read memory/today.md with the morning news.
      Search for updates and developments on the same stories.
      Append the evening recap to memory/today.md with heading "=== EVENING ===".
      Then write the recap text to output to send via Telegram.
