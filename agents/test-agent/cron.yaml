name: test-agent
enabled: true
heartbeat: 7200
heartbeat_model: claude-haiku-4-5-20251001
telegram_chat_id: ""

permissions:
  bash: false
  internet: true
  write_outside_dir: false
  telegram_without_approval: true

crons:
  - id: news-morning
    schedule: "0 8 * * *"
    model: claude-haiku-4-5-20251001
    prompt: >
      Find the most important news of today. Only two lines.
      Write it to output.txt in your folder (overwrite it).

  - id: news-evening
    schedule: "0 18 * * *"
    model: claude-sonnet-4-6
    prompt: >
      Summarize the main news stories of the day.
      Append it to output.txt with heading "=== EVENING ===".
