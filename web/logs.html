<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyCow — Logs</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --color-bg: #0F1117;
    --color-surface: #1A1D27;
    --color-surface-2: #22263A;
    --color-border: #2A2D3E;
    --color-primary: #2D6A4F;
    --color-primary-light: #52B788;
    --color-primary-pale: #1B4D3E;
    --color-text-primary: #F0F0F0;
    --color-text-secondary: #8892A4;
    --color-text-muted: #4A5568;
    --color-success: #52B788;
    --color-warning: #F6AD55;
    --color-error: #FC8181;
    --color-info: #63B3ED;
    --radius-sm: 6px;
    --radius-md: 10px;
    --radius-lg: 16px;
    --space-1: 4px; --space-2: 8px; --space-3: 12px; --space-4: 16px;
    --space-6: 24px; --space-8: 32px;
  }

  body {
    background: var(--color-bg);
    color: var(--color-text-primary);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    font-size: 14px; line-height: 1.5; min-height: 100vh;
  }

  /* HEADER */
  .header {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    background: var(--color-surface);
    border-bottom: 1px solid var(--color-border);
    height: 56px; display: flex; align-items: center;
    padding: 0 var(--space-6); gap: var(--space-4);
  }
  .header-logo {
    font-size: 16px; font-weight: 700; color: var(--color-text-primary);
    text-decoration: none; display: flex; align-items: center; gap: var(--space-2);
  }
  .header-nav { display: flex; gap: var(--space-1); }
  .nav-link {
    padding: var(--space-2) var(--space-3); border-radius: var(--radius-sm);
    color: var(--color-text-secondary); text-decoration: none; font-size: 13px;
    transition: color 0.15s, background 0.15s;
  }
  .nav-link:hover { color: var(--color-text-primary); background: var(--color-surface-2); }
  .nav-link.active { color: var(--color-primary-light); background: var(--color-primary-pale); }
  .header-right { display: flex; align-items: center; gap: var(--space-3); margin-left: auto; }
  .daemon-badge { display: flex; align-items: center; gap: var(--space-2); font-size: 12px; color: var(--color-text-secondary); }
  .daemon-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--color-text-muted); transition: background 0.3s; }
  .daemon-dot.online { background: var(--color-success); box-shadow: 0 0 6px var(--color-success); }
  .daemon-dot.offline { background: var(--color-error); }

  /* BUTTONS */
  .btn {
    padding: var(--space-2) var(--space-3); border-radius: var(--radius-sm);
    border: none; cursor: pointer; font-size: 13px; font-family: inherit;
    transition: opacity 0.15s, transform 0.1s;
    display: inline-flex; align-items: center; gap: var(--space-1);
  }
  .btn:hover { opacity: 0.85; }
  .btn:active { transform: scale(0.97); }
  .btn-primary { background: var(--color-primary); color: #fff; }
  .btn-danger { background: #7B1818; color: var(--color-error); }
  .btn-ghost {
    background: transparent; color: var(--color-text-secondary);
    border: 1px solid var(--color-border);
  }
  .btn-ghost:hover { color: var(--color-text-primary); border-color: var(--color-text-muted); }

  /* MAIN */
  .main { padding-top: 56px; }
  .container { max-width: 1200px; margin: 0 auto; padding: var(--space-8) var(--space-6); }

  /* PAGE HEADER */
  .page-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: var(--space-6);
  }
  .page-title { font-size: 20px; font-weight: 600; }

  /* CONTROLS */
  .log-controls {
    display: flex; gap: var(--space-3); align-items: center;
    margin-bottom: var(--space-6); flex-wrap: wrap;
  }
  .control-group {
    display: flex; gap: var(--space-2); align-items: center;
  }
  .control-label {
    font-size: 13px; color: var(--color-text-secondary); font-weight: 500;
  }
  select {
    background: var(--color-surface-2); color: var(--color-text-primary);
    border: 1px solid var(--color-border); border-radius: var(--radius-sm);
    padding: var(--space-2) var(--space-3); font-size: 13px;
    cursor: pointer; outline: none; transition: border-color 0.15s;
  }
  select:focus { border-color: var(--color-primary-light); }

  /* CHECKBOX */
  .checkbox-group {
    display: flex; gap: var(--space-2); align-items: center;
  }
  input[type="checkbox"] {
    cursor: pointer; width: 16px; height: 16px;
    accent-color: var(--color-primary);
  }

  /* LOG TABLE */
  .log-table-container {
    background: var(--color-surface);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-md);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    height: 600px;
  }
  .log-table-header {
    display: grid;
    grid-template-columns: 160px 80px 180px 1fr;
    gap: 0;
    background: var(--color-surface-2);
    border-bottom: 1px solid var(--color-border);
    padding: var(--space-3) var(--space-4);
    font-size: 12px;
    font-weight: 600;
    color: var(--color-text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    position: sticky;
    top: 0;
  }
  .log-table-body {
    flex: 1; overflow-y: auto;
    display: flex; flex-direction: column;
  }
  .log-row {
    display: grid;
    grid-template-columns: 160px 80px 180px 1fr;
    gap: 0;
    padding: var(--space-3) var(--space-4);
    border-bottom: 1px solid var(--color-border);
    font-size: 12px;
    align-items: start;
    gap: var(--space-3);
  }
  .log-row:last-child { border-bottom: none; }
  .log-timestamp { color: var(--color-text-muted); font-family: 'Monaco', monospace; }
  .log-level { font-weight: 600; }
  .log-logger { color: var(--color-text-secondary); }
  .log-message { color: var(--color-text-primary); word-break: break-word; white-space: pre-wrap; }

  .level-debug { color: #888; }
  .level-info { color: var(--color-info); }
  .level-warning { color: var(--color-warning); }
  .level-error { color: var(--color-error); }
  .level-critical { color: var(--color-error); font-weight: 700; }

  .empty-state {
    display: flex; align-items: center; justify-content: center;
    height: 100%; color: var(--color-text-muted);
    font-size: 13px;
  }
</style>
</head>
<body>

<!-- HEADER -->
<header class="header">
  <a href="/" class="header-logo">🐄 MyCow</a>
  <nav class="header-nav">
    <a href="/" class="nav-link">Dashboard</a>
    <a href="/skills.html" class="nav-link">Skills</a>
    <a href="/logs.html" class="nav-link active">Logs</a>
    <a href="/settings.html" class="nav-link">Settings</a>
  </nav>
  <div class="header-right">
    <div class="daemon-badge">
      <div class="daemon-dot" id="daemonDot"></div>
      <span id="daemonLabel">Connecting...</span>
    </div>
    <button class="btn btn-danger" onclick="openStopAll()">⬛ Stop All</button>
  </div>
</header>

<!-- MAIN -->
<main class="main">
  <div class="container">
    <div class="page-header">
      <div class="page-title">System Logs</div>
    </div>

    <!-- CONTROLS -->
    <div class="log-controls">
      <div class="control-group">
        <label class="control-label">Level:</label>
        <select id="levelFilter" onchange="applyFilters()">
          <option value="">All</option>
          <option value="DEBUG">Debug</option>
          <option value="INFO">Info</option>
          <option value="WARNING">Warning</option>
          <option value="ERROR">Error</option>
          <option value="CRITICAL">Critical</option>
        </select>
      </div>

      <div class="checkbox-group">
        <input type="checkbox" id="autoPauseCheckbox" checked onchange="toggleAutoRefresh()">
        <label class="control-label" for="autoPauseCheckbox">Auto-refresh</label>
      </div>

      <button class="btn btn-ghost" onclick="clearView()">Clear view</button>
    </div>

    <!-- LOG TABLE -->
    <div class="log-table-container">
      <div class="log-table-header">
        <div>Timestamp</div>
        <div>Level</div>
        <div>Logger</div>
        <div>Message</div>
      </div>
      <div class="log-table-body" id="logTableBody">
        <div class="empty-state">Waiting for logs...</div>
      </div>
    </div>
  </div>
</main>

<!-- MODAL STOP ALL -->
<div class="overlay" id="stopAllOverlay" onclick="closeStopAll(event)">
  <div class="modal">
    <div class="modal-title">Stop all agents?</div>
    <div class="modal-text">
      This action creates the <code>EMERGENCY_STOP</code> file and immediately halts all active cron jobs and heartbeats.
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeStopAll()">Cancel</button>
      <button class="btn btn-danger" onclick="confirmStopAll()">⬛ Stop everything</button>
    </div>
  </div>
</div>

<style>
  /* MODAL STYLES */
  .overlay {
    display: none; position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,0.7);
    align-items: center; justify-content: center;
  }
  .overlay.open { display: flex; }

  .modal {
    background: var(--color-surface);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-lg);
    padding: var(--space-6);
    max-width: 420px; width: 90%;
  }
  .modal-title { font-size: 16px; font-weight: 600; margin-bottom: var(--space-2); }
  .modal-text { font-size: 13px; color: var(--color-text-secondary); margin-bottom: var(--space-6); }
  .modal-actions { display: flex; gap: var(--space-3); justify-content: flex-end; }
</style>

<script>
  const BASE = window.location.origin;
  let autoRefresh = true;
  let currentLogs = [];
  let scrolledToBottom = true;

  async function fetchLogs() {
    if (!autoRefresh) return;
    try {
      const level = document.getElementById('levelFilter').value || '';
      const url = level ? `${BASE}/api/logs?limit=500&level=${level}` : `${BASE}/api/logs?limit=500`;
      const resp = await fetch(url);
      if (!resp.ok) return;
      currentLogs = await resp.json();
      renderLogs();
    } catch (e) {
      console.error('Error fetching logs:', e);
    }
  }

  function renderLogs() {
    const body = document.getElementById('logTableBody');
    if (!currentLogs || currentLogs.length === 0) {
      body.innerHTML = '<div class="empty-state">No logs</div>';
      return;
    }

    const wasAtBottom = scrolledToBottom;
    body.innerHTML = currentLogs.map(log => {
      const ts = new Date(log.timestamp).toLocaleTimeString('en-GB', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
      const levelLower = log.level.toLowerCase();
      return `
        <div class="log-row">
          <div class="log-timestamp">${ts}</div>
          <div class="log-level level-${levelLower}">${log.level}</div>
          <div class="log-logger">${log.logger}</div>
          <div class="log-message">${escHtml(log.message)}</div>
        </div>`;
    }).join('');

    // Auto-scroll to bottom if was already there
    if (wasAtBottom) {
      body.scrollTop = body.scrollHeight;
    }
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function applyFilters() {
    fetchLogs();
  }

  function toggleAutoRefresh() {
    autoRefresh = document.getElementById('autoPauseCheckbox').checked;
    if (autoRefresh) fetchLogs();
  }

  function clearView() {
    document.getElementById('logTableBody').innerHTML = '<div class="empty-state">Logs cleared</div>';
  }

  // Track scroll position to auto-scroll only when at bottom
  document.addEventListener('DOMContentLoaded', () => {
    const body = document.getElementById('logTableBody');
    body.addEventListener('scroll', () => {
      scrolledToBottom = body.scrollTop + body.clientHeight >= body.scrollHeight - 10;
    });
  });

  async function fetchHealth() {
    try {
      const res = await fetch('/health');
      const data = await res.json();
      const dot = document.getElementById('daemonDot');
      const label = document.getElementById('daemonLabel');
      dot.className = 'daemon-dot online';
      label.textContent = data.emergency_stop ? 'Emergency Stop' : 'Online';
      if (data.emergency_stop) dot.className = 'daemon-dot offline';
    } catch {
      document.getElementById('daemonDot').className = 'daemon-dot offline';
      document.getElementById('daemonLabel').textContent = 'Offline';
    }
  }

  function openStopAll() {
    document.getElementById('stopAllOverlay').classList.add('open');
  }

  function closeStopAll(e) {
    if (!e || e.target === document.getElementById('stopAllOverlay'))
      document.getElementById('stopAllOverlay').classList.remove('open');
  }

  async function confirmStopAll() {
    try {
      await fetch('/api/stop-all', { method: 'POST' });
      closeStopAll();
      fetchHealth();
    } catch {
      console.error('Error stopping all agents');
    }
  }

  // Init
  fetchLogs();
  fetchHealth();
  setInterval(fetchLogs, 3000);
  setInterval(fetchHealth, 10000);
</script>
</body>
</html>
